name: Build and deploy DocuAI to Azure

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Download source code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check required project files
        run: |
          test -f app.py
          test -f requirements.txt
          test -f data/dora_certification.pdf
          test -f vectorstore/dora_certification/index.faiss
          test -f vectorstore/dora_certification/chunks.pkl

      - name: Create deployment package
        run: |
          zip -r deployment.zip . \
            -x ".git/*" \
            -x ".github/*" \
            -x ".env" \
            -x "antenv/*" \
            -x "*/__pycache__/*" \
            -x "*.pyc"

      - name: Upload deployment package
        uses: actions/upload-artifact@v4
        with:
          name: docuai-package
          path: deployment.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download deployment package
        uses: actions/download-artifact@v4
        with:
          name: docuai-package

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_247C6489C8D647CBAD5F759A10E93EDD }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_9EB4C7F2DE85469EB8C4EB1E2CDE9B95 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_C326D7304F9A4D9CA52886A25E95DBCE }}

      - name: Deploy application to Azure
        uses: azure/webapps-deploy@v3
        with:
          app-name: assistant-document-ai-kanzari
          slot-name: Production
          package: deployment.zip
